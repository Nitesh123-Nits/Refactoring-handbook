<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Refactoring — Engineering Handbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #0d0f12;
  --bg2: #13161b;
  --bg3: #1a1e25;
  --border: #252a33;
  --accent: #f0a500;
  --accent2: #3ecf8e;
  --accent3: #5b8dee;
  --text: #d4d8e1;
  --text-dim: #7a8190;
  --text-bright: #f0f2f5;
  --sidebar-w: 300px;
  --code-bg: #141820;
  --tag-bg: #1f2630;
  --danger: #e05c5c;
  --warn: #e09c3e;
  --success: #3ecf8e;
}
[data-theme="light"] {
  --bg: #f5f4f0;
  --bg2: #eceae4;
  --bg3: #e0ddd5;
  --border: #ccc9c0;
  --text: #2c2d30;
  --text-dim: #6b6d75;
  --text-bright: #111215;
  --code-bg: #1e2230;
  --tag-bg: #dddad0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  line-height: 1.7;
}

/* ─── SIDEBAR ─────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0;
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.3s ease;
  overflow-y: auto;
}
.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.sidebar-sub {
  font-size: 0.72rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
}
#search-box {
  margin: 14px 16px;
  position: relative;
}
#search-input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.8rem;
}
nav { flex: 1; padding: 8px 0 24px; }
.nav-group { margin-bottom: 4px; }
.nav-group-title {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  padding: 12px 24px 6px;
  font-family: 'IBM Plex Mono', monospace;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 24px;
  font-size: 0.84rem;
  color: var(--text);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: all 0.15s;
}
.nav-link:hover { color: var(--accent); background: var(--bg3); border-left-color: var(--accent); }
.nav-link.active { color: var(--accent); background: var(--bg3); border-left-color: var(--accent); font-weight: 500; }
.nav-link .nav-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  min-width: 20px;
}

/* ─── MAIN ─────────────────────────────────── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  max-width: 100%;
}
#topbar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
  backdrop-filter: blur(8px);
}
.topbar-breadcrumb {
  font-size: 0.82rem;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
}
.topbar-actions { display: flex; gap: 12px; align-items: center; }
#theme-toggle {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
#theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
#menu-toggle {
  display: none;
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
}

content-wrap {
  display: block;
  padding: 60px 80px 100px;
  max-width: 960px;
}

/* ─── SECTIONS ─────────────────────────────── */
.chapter {
  padding-bottom: 80px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 80px;
}
.chapter:last-child { border-bottom: none; }
.chapter-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 16px;
  background: rgba(240,165,0,0.08);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid rgba(240,165,0,0.2);
}
h1.chapter-title {
  font-family: 'Fraunces', serif;
  font-size: 2.6rem;
  font-weight: 900;
  color: var(--text-bright);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}
h2 {
  font-family: 'Fraunces', serif;
  font-size: 1.65rem;
  font-weight: 600;
  color: var(--text-bright);
  margin: 52px 0 16px;
  letter-spacing: -0.5px;
  padding-top: 8px;
}
h3 {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--accent2);
  margin: 32px 0 12px;
  font-family: 'DM Sans', sans-serif;
}
h4 {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--accent3);
  margin: 24px 0 8px;
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 1px;
}
p { margin-bottom: 16px; color: var(--text); }
a { color: var(--accent3); }
strong { color: var(--text-bright); font-weight: 500; }

/* ─── CALLOUTS ─────────────────────────────── */
.callout {
  border-left: 3px solid var(--accent);
  background: rgba(240,165,0,0.06);
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin: 24px 0;
  font-size: 0.9rem;
}
.callout.info { border-left-color: var(--accent3); background: rgba(91,141,238,0.06); }
.callout.success { border-left-color: var(--accent2); background: rgba(62,207,142,0.06); }
.callout.danger { border-left-color: var(--danger); background: rgba(224,92,92,0.06); }
.callout-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  color: var(--accent);
  font-weight: 600;
}
.callout.info .callout-title { color: var(--accent3); }
.callout.success .callout-title { color: var(--accent2); }
.callout.danger .callout-title { color: var(--danger); }

/* ─── CODE BLOCKS ──────────────────────────── */
.code-block {
  position: relative;
  margin: 20px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
}
.code-lang-badge {
  background: var(--tag-bg);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.7rem;
}
.copy-btn {
  background: var(--tag-bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--accent2); border-color: var(--accent2); }
.copy-btn.copied { color: var(--accent2); border-color: var(--accent2); }
.code-block pre {
  margin: 0;
  padding: 20px;
  background: var(--code-bg) !important;
  overflow-x: auto;
  font-size: 0.83rem;
  line-height: 1.65;
}
.code-block code { font-family: 'IBM Plex Mono', monospace; }

/* ─── BEFORE/AFTER ─────────────────────────── */
.ba-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 24px 0;
}
.ba-panel { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.ba-label {
  padding: 8px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}
.ba-before .ba-label { background: rgba(224,92,92,0.12); color: var(--danger); border-bottom: 1px solid rgba(224,92,92,0.2); }
.ba-after .ba-label { background: rgba(62,207,142,0.1); color: var(--accent2); border-bottom: 1px solid rgba(62,207,142,0.2); }
.ba-panel pre { margin: 0; padding: 16px; background: var(--code-bg) !important; font-size: 0.78rem; line-height: 1.6; overflow-x: auto; }
.ba-panel code { font-family: 'IBM Plex Mono', monospace; }

/* ─── SMELL CARDS ──────────────────────────── */
.smell-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin: 24px 0;
}
.smell-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: border-color 0.2s, transform 0.2s;
}
.smell-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.smell-icon { font-size: 1.5rem; margin-bottom: 10px; }
.smell-name {
  font-weight: 500;
  color: var(--text-bright);
  margin-bottom: 6px;
  font-size: 0.95rem;
}
.smell-desc { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; }
.smell-severity {
  display: inline-block;
  margin-top: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 4px;
}
.sev-high { background: rgba(224,92,92,0.15); color: var(--danger); }
.sev-med { background: rgba(224,156,62,0.15); color: var(--warn); }
.sev-low { background: rgba(62,207,142,0.12); color: var(--accent2); }

/* ─── TECHNIQUE CARDS ──────────────────────── */
.technique {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin: 28px 0;
}
.technique-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}
.technique-title {
  font-family: 'Fraunces', serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-bright);
}
.technique-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: rgba(91,141,238,0.12);
  color: var(--accent3);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(91,141,238,0.2);
}
.steps-list {
  counter-reset: steps;
  list-style: none;
  margin: 16px 0;
}
.steps-list li {
  counter-increment: steps;
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
  font-size: 0.88rem;
  align-items: flex-start;
}
.steps-list li::before {
  content: counter(steps);
  min-width: 24px;
  height: 24px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
  flex-shrink: 0;
  margin-top: 2px;
}
.tradeoffs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
.tradeoff-box {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.82rem;
}
.tradeoff-box h5 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.tradeoff-box.pro h5 { color: var(--accent2); }
.tradeoff-box.con h5 { color: var(--danger); }
.tradeoff-box ul { list-style: none; }
.tradeoff-box ul li { padding: 3px 0; color: var(--text-dim); }
.tradeoff-box ul li::before { content: '— '; }

/* ─── TABLES ───────────────────────────────── */
.table-wrap { overflow-x: auto; margin: 24px 0; border-radius: 10px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th {
  background: var(--bg3);
  padding: 12px 16px;
  text-align: left;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg2); }
td code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  background: var(--tag-bg);
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--accent2);
}

/* ─── MERMAID ──────────────────────────────── */
.diagram-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin: 28px 0;
  overflow-x: auto;
}
.diagram-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.mermaid { display: flex; justify-content: center; }

/* ─── CHECKLIST ────────────────────────────── */
.checklist {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
  margin: 24px 0;
}
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  cursor: pointer;
  transition: border-color 0.15s;
  font-size: 0.85rem;
}
.check-item:hover { border-color: var(--accent2); }
.check-item input[type="checkbox"] { accent-color: var(--accent2); margin-top: 2px; flex-shrink: 0; width: 16px; height: 16px; }
.check-item label { cursor: pointer; }

/* ─── Q&A ──────────────────────────────────── */
.qa-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.qa-question {
  padding: 16px 20px;
  background: var(--bg2);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 500;
  font-size: 0.9rem;
  transition: background 0.15s;
}
.qa-question:hover { background: var(--bg3); }
.qa-question .qa-icon { transition: transform 0.2s; color: var(--accent); font-size: 1.1rem; }
.qa-answer {
  padding: 0 20px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  font-size: 0.86rem;
  color: var(--text-dim);
}
.qa-item.open .qa-answer { max-height: 600px; padding: 16px 20px; }
.qa-item.open .qa-icon { transform: rotate(45deg); }

/* ─── CASE STUDY ───────────────────────────── */
.case-study {
  background: linear-gradient(135deg, rgba(240,165,0,0.05) 0%, rgba(62,207,142,0.03) 100%);
  border: 1px solid rgba(240,165,0,0.2);
  border-radius: 14px;
  padding: 36px;
  margin: 32px 0;
}
.cs-company {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 6px;
}
.cs-title {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 20px;
}
.cs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
.cs-stat {
  text-align: center;
  background: var(--bg2);
  border-radius: 10px;
  padding: 20px 12px;
  border: 1px solid var(--border);
}
.cs-stat-val {
  font-family: 'Fraunces', serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--accent);
  display: block;
}
.cs-stat-lbl { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }

/* ─── TOOL CARDS ───────────────────────────── */
.tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin: 24px 0; }
.tool-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: all 0.2s;
}
.tool-card:hover { border-color: var(--accent3); transform: translateY(-2px); }
.tool-name { font-weight: 500; color: var(--text-bright); margin-bottom: 6px; }
.tool-cat { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--accent3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.tool-desc { font-size: 0.8rem; color: var(--text-dim); }

/* ─── HERO ─────────────────────────────────── */
#hero {
  padding: 80px 80px 60px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
#hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(240,165,0,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 20px;
}
.hero-title {
  font-family: 'Fraunces', serif;
  font-size: 4rem;
  font-weight: 900;
  color: var(--text-bright);
  line-height: 1.05;
  letter-spacing: -2px;
  margin-bottom: 24px;
}
.hero-title em { font-style: italic; color: var(--accent); }
.hero-desc { max-width: 600px; font-size: 1.05rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 32px; }
.hero-chips { display: flex; flex-wrap: wrap; gap: 10px; }
.chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.chip.accent { border-color: rgba(240,165,0,0.3); color: var(--accent); background: rgba(240,165,0,0.06); }
.chip.green { border-color: rgba(62,207,142,0.3); color: var(--accent2); background: rgba(62,207,142,0.06); }
.chip.blue { border-color: rgba(91,141,238,0.3); color: var(--accent3); background: rgba(91,141,238,0.06); }

/* ─── PROGRESS BAR ─────────────────────────── */
#reading-progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 200;
  transition: width 0.1s;
}

/* ─── RESPONSIVE ───────────────────────────── */
@media (max-width: 900px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  content-wrap { padding: 40px 28px 80px; }
  #hero { padding: 48px 28px 40px; }
  .hero-title { font-size: 2.6rem; }
